<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0e0e12;
        --panel: #17171d;
        --panel2: #1c1c23;
        --fg: #f5f5f5;
        --muted: #9d9da6;
        --accent: #ff2d55;
        --accent2: #ff8a3d;
        --field: #232329;
        --border: #33333c;
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { scrollbar-width: thin; scrollbar-color: #3a3a44 var(--bg); }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb {
        background: #3a3a44; border-radius: 999px; border: 2px solid var(--bg);
      }
      ::-webkit-scrollbar-thumb:hover { background: #4a4a55; }
      body {
        margin: 0;
        width: 330px;
        font-family: -apple-system, system-ui, sans-serif;
        background: radial-gradient(600px 220px at 50% -60px, #1e1626 0%, var(--bg) 65%);
        color: var(--fg);
        padding: 16px;
      }
      .head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.2px; }
      .logo {
        width: 30px; height: 30px; border-radius: 8px;
        box-shadow: 0 2px 10px rgba(255, 45, 85, 0.3);
      }
      .tagline { font-size: 10px; color: var(--muted); margin-top: 1px; letter-spacing: 0.3px; }

      .idle {
        font-size: 12px; color: var(--muted); background: var(--panel);
        border: 1px solid var(--border); border-radius: 12px; padding: 14px;
        text-align: center; line-height: 1.6; margin-bottom: 12px;
      }

      /* deck cards */
      .card {
        background: linear-gradient(180deg, var(--panel2), var(--panel));
        border: 1px solid var(--border);
        border-radius: 14px; padding: 12px; margin-bottom: 10px;
        cursor: pointer;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      .card:hover { border-color: #4a4a55; }
      .card.live { border-color: rgba(255, 45, 85, 0.55); box-shadow: 0 0 18px rgba(255, 45, 85, 0.12); }
      .card .top { display: flex; gap: 12px; align-items: center; }
      .thumb {
        width: 66px; height: 37px; border-radius: 7px; object-fit: cover;
        background: #000; flex: none;
      }
      .info { min-width: 0; flex: 1; }
      .row1 { display: flex; align-items: center; gap: 7px; }
      .deckname {
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
        color: var(--muted); font-weight: 700;
      }
      .card.live .deckname { color: var(--accent); }
      .song {
        font-size: 12.5px; font-weight: 600; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; margin-top: 3px;
      }
      .artist {
        font-size: 11px; color: var(--muted); white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
      }

      /* spinning disc: only the live deck shows it */
      .disc {
        width: 30px; height: 30px; border-radius: 50%; flex: none;
        position: relative; display: none;
        background:
          conic-gradient(from 20deg, rgba(255,255,255,0.16) 0 12%, transparent 12% 48%, rgba(255,255,255,0.09) 48% 62%, transparent 62%),
          repeating-radial-gradient(circle at 50% 50%, #36363f 0 1px, #1a1a20 1px 3px);
        box-shadow: 0 0 12px rgba(255, 45, 85, 0.35);
      }
      .disc::after {
        content: ""; position: absolute; inset: 9px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }
      .disc::before {
        content: ""; position: absolute; inset: 13px; border-radius: 50%;
        background: #0e0e12; z-index: 1;
      }
      .card.live .disc { display: block; animation: spin 2s linear infinite; }
      .card.paused .disc { animation-play-state: paused; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* standby deck skeleton while the next track cues up */
      @keyframes shimmer { to { background-position: -200% 0; } }
      .card.loading .thumb {
        background: linear-gradient(90deg, #1c1c22 25%, #2c2c36 50%, #1c1c22 75%);
        background-size: 200% 100%; animation: shimmer 1.15s linear infinite;
      }
      .card.loading .song { color: var(--muted); font-weight: 500; }
      .card.loading .artist::before {
        content: ""; display: block; height: 9px; width: 60%; margin-top: 3px;
        border-radius: 4px;
        background: linear-gradient(90deg, #1c1c22 25%, #2c2c36 50%, #1c1c22 75%);
        background-size: 200% 100%; animation: shimmer 1.15s linear infinite;
      }
      .dots::after {
        content: ""; animation: dots 1.4s steps(1, end) infinite;
      }
      @keyframes dots {
        0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; }
      }

      /* segment progress */
      .bar {
        display: none;
        margin-top: 11px; height: 3px; border-radius: 999px;
        background: #2a2a32; overflow: hidden;
      }
      .card.live .bar, .card.blend .bar { display: block; }
      .bar .fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 999px;
        transition: width 0.95s linear;
      }
      .times {
        display: none; justify-content: space-between;
        font-size: 10px; color: var(--muted); margin-top: 4px;
        font-variant-numeric: tabular-nums;
      }
      .card.live .times { display: flex; }

      /* transport */
      .transport {
        display: flex; justify-content: center; align-items: flex-start;
        gap: 26px; margin: 14px 0 6px;
      }
      .tctl { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .tctl > span { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; }
      .tbtn {
        width: 38px; height: 38px; border-radius: 50%;
        background: var(--field); border: 1px solid var(--border); color: var(--fg);
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        transition: border-color 0.15s;
      }
      .tbtn:hover { border-color: var(--accent); }
      .tbtn:disabled { opacity: 0.35; cursor: default; }
      .tbtn svg { width: 13px; height: 13px; fill: currentColor; }
      .tbtn.big {
        width: 48px; height: 48px; border: 0; color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow: 0 4px 14px rgba(255, 45, 85, 0.35);
      }
      .tbtn.big svg { width: 16px; height: 16px; }

      .stopbtn {
        display: flex; align-items: center; gap: 6px;
        width: max-content; margin: 12px auto 2px; padding: 5px 12px;
        background: none; border: 0; cursor: pointer;
        color: var(--muted); font-size: 11px; letter-spacing: 0.2px;
        transition: color 0.15s;
      }
      .stopbtn:hover { color: var(--fg); }
      .stopbtn svg { width: 9px; height: 9px; fill: currentColor; }

      .switch { position: relative; width: 40px; height: 22px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0; background: var(--border);
        border-radius: 999px; transition: background 0.15s;
      }
      .slider::before {
        content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px;
        background: #fff; border-radius: 50%; transition: transform 0.15s;
      }
      .switch input:checked + .slider { background: var(--accent); }
      .switch input:checked + .slider::before { transform: translateX(18px); }

      .fxhead {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
        color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between;
      }
      .fxhead span { text-transform: none; letter-spacing: 0; font-size: 10px; opacity: 0.8; }
      .presets { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
      .presets button {
        flex: 1 1 22%; min-width: 62px; padding: 7px 4px; border-radius: 7px;
        border: 1px solid var(--border); background: var(--field);
        color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer;
        transition: color 0.12s, border-color 0.12s;
      }
      .presets button:hover { color: var(--fg); }
      .presets button.active {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff; border-color: transparent;
      }
      .fx { opacity: 0.55; transition: opacity 0.15s; }
      .fx.on { opacity: 1; }
      .fxrow { display: flex; align-items: center; justify-content: space-between; }
      .fxrow .name { font-size: 13px; }
      .fxrow .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
      .fxright { display: flex; align-items: center; gap: 9px; }
      .fxval {
        font-size: 11px; color: var(--muted); min-width: 40px; text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .fx.on .fxval { color: var(--fg); }
      input[type="range"] {
        width: 100%; margin: 8px 0 2px; height: 4px; -webkit-appearance: none;
        background: var(--field); border-radius: 999px; outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2)); cursor: pointer;
      }
      input[type="range"]:disabled { opacity: 0.5; }
      input[type="range"]:disabled::-webkit-slider-thumb { background: var(--border); cursor: default; }

      .startbtn {
        width: 100%; border: 0; border-radius: 10px; cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff; font-size: 13px; font-weight: 700; padding: 12px 0;
        letter-spacing: 0.3px;
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        box-shadow: 0 4px 14px rgba(255, 45, 85, 0.25);
      }
      .startbtn svg { width: 12px; height: 12px; fill: currentColor; }

      .deck-hint { font-size: 11px; color: var(--muted); text-align: center; margin: 6px 0 2px; min-height: 14px; }
      .volrow { display: flex; align-items: center; gap: 9px; margin: 14px 2px 4px; }
      .volico { width: 16px; height: 16px; fill: var(--muted); color: var(--muted); flex: none; }
      .volrow input[type="range"] { margin: 0; }
      .volval { font-size: 11px; color: var(--muted); min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }
      .warn {
        font-size: 10.5px; color: var(--accent2); text-align: center;
        margin-top: 8px; opacity: 0.85;
      }

      .grid { display: flex; flex-direction: column; gap: 10px; }
      .field { display: flex; align-items: center; justify-content: space-between; }
      .field .name { font-size: 13px; }
      .field .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
      .range { display: flex; align-items: center; gap: 6px; }
      .range span { color: var(--muted); font-size: 12px; }
      input[type="number"] {
        width: 60px; background: var(--field); color: var(--fg);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 6px 8px; font-size: 13px; text-align: center;
      }
      input[type="number"]:focus { outline: none; border-color: var(--accent); }
      .divider { height: 1px; background: var(--border); margin: 14px 0; }
      .credit {
        display: block; text-align: center; font-size: 10px; letter-spacing: 0.5px;
        color: var(--muted); opacity: 0.7; margin-top: 16px;
        text-decoration: none; transition: color 0.15s, opacity 0.15s;
      }
      .credit:hover { color: var(--accent); opacity: 1; }
    </style>
  </head>
  <body>
    <div class="head">
      <img class="logo" src="icon48.png" alt="" />
      <div>
        <h1>AutoDJ</h1>
        <div class="tagline">for YouTube Music</div>
      </div>
    </div>

    <div class="idle" id="djIdle">Play a song on music.youtube.com,<br />then hit Start DJ.</div>

    <div id="djLive" style="display:none">
      <div class="card" id="cardSelf">
        <div class="top">
          <img class="thumb" id="thumbSelf" alt="" />
          <div class="info">
            <div class="row1"><span class="deckname">Deck A</span></div>
            <div class="song" id="songSelf"></div>
            <div class="artist" id="artistSelf"></div>
          </div>
          <div class="disc"></div>
        </div>
        <div class="bar"><div class="fill" id="fillSelf"></div></div>
        <div class="times"><span id="curSelf">0:00</span><span id="totSelf">0:00</span></div>
      </div>

      <div class="card" id="cardRemote">
        <div class="top">
          <img class="thumb" id="thumbRemote" alt="" />
          <div class="info">
            <div class="row1"><span class="deckname">Deck B</span></div>
            <div class="song" id="songRemote"></div>
            <div class="artist" id="artistRemote"></div>
          </div>
          <div class="disc"></div>
        </div>
        <div class="bar"><div class="fill" id="fillRemote"></div></div>
        <div class="times"><span id="curRemote">0:00</span><span id="totRemote">0:00</span></div>
      </div>

      <div class="transport">
        <div class="tctl">
          <button class="tbtn" id="btnSkip" title="Load a different upcoming track">
            <svg viewBox="0 0 14 14"><path d="M2 3h7V1l4 3.5L9 8V6H4v5H2z" /></svg>
          </button>
          <span>Swap next</span>
        </div>
        <div class="tctl">
          <button class="tbtn big" id="btnPlayPause">
            <svg id="icoPause" viewBox="0 0 14 14"><rect x="2.5" y="2" width="3.2" height="10" rx="1" /><rect x="8.3" y="2" width="3.2" height="10" rx="1" /></svg>
            <svg id="icoPlay" viewBox="0 0 14 14" style="display:none"><path d="M3.5 2l9 5-9 5z" /></svg>
          </button>
          <span id="ppLabel">Pause</span>
        </div>
        <div class="tctl">
          <button class="tbtn" id="btnPlayNow" title="Crossfade to the next track now">
            <svg viewBox="0 0 14 14"><path d="M2 2l7 5-7 5z" /><rect x="10" y="2" width="2.4" height="10" rx="1" /></svg>
          </button>
          <span>Play next</span>
        </div>
      </div>
      <div class="volrow">
        <svg class="volico" viewBox="0 0 16 16"><path d="M2 6v4h3l4 3V3L5 6H2z" /><path d="M11 5.5a3 3 0 010 5" fill="none" stroke="currentColor" stroke-width="1.3" /></svg>
        <input type="range" id="volume" min="0" max="100" step="1" />
        <span class="volval" id="volVal">100%</span>
      </div>

      <button class="stopbtn" id="dj2Stop">
        <svg viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1.5" /></svg>
        Stop mix
      </button>
      <div class="warn">Keep both YT Music tabs open while mixing</div>
    </div>

    <button class="startbtn" id="dj2Start">
      <svg viewBox="0 0 12 12"><path d="M2 1l9 5-9 5z" /></svg>
      Start DJ
    </button>
    <div class="deck-hint" id="dj2Status"></div>

    <div class="divider"></div>

    <div class="grid">
      <div class="field">
        <div>
          <div class="name">Segment range</div>
          <div class="sub">random length per track (s)</div>
        </div>
        <div class="range">
          <input type="number" id="segMin" min="5" max="180" step="1" />
          <span>to</span>
          <input type="number" id="segMax" min="5" max="180" step="1" />
        </div>
      </div>

      <div class="field">
        <div>
          <div class="name">Overlap</div>
          <div class="sub">both songs together (s)</div>
        </div>
        <input type="number" id="overlap" min="1" max="15" step="0.5" />
      </div>

    </div>

    <div class="divider"></div>
    <div class="fxhead">Effects</div>
    <div class="presets" id="presets">
      <button data-preset="none">None</button>
      <button data-preset="lofi">Lo-fi</button>
      <button data-preset="dreamy">Dreamy</button>
      <button data-preset="vintage">Vintage</button>
      <button data-preset="nightcore">Nightcore</button>
      <button data-preset="club">Club</button>
      <button data-preset="screwed">Screwed</button>
      <button data-preset="space">8D</button>
      <button data-preset="custom">Custom</button>
    </div>
    <div class="grid" id="fxRack"></div>

    <a id="credit" class="credit" href="https://github.com/jad-jayzee" target="_blank" rel="noopener">by Jad</a>

    <script src="popup.js"></script>
  </body>
</html>
